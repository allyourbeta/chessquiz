<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#c9a84c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ChessQuiz">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChessQuiz</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
    :root {
      --bg: #1a1a1f; --surface: #242429; --surface-hover: #2e2e35;
      --border: #3a3a42; --text: #e8e6e3; --text-muted: #8a8a95;
      --accent: #c9a84c; --accent-dim: #8a7535; --green: #6abf69;
      --red: #e05555; --tag-bg: #2a2a35; --radius: 8px;
      --light-sq: #f0d9b5; --dark-sq: #b58863;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Mono',monospace; background:var(--bg); color:var(--text); min-height:100vh; }
    header { display:flex; align-items:center; justify-content:space-between; padding:20px 32px; border-bottom:1px solid var(--border); }
    header h1 { font-family:'Instrument Serif',serif; font-size:28px; font-weight:400; color:var(--accent); }
    nav { display:flex; gap:4px; }
    nav button { background:none; border:1px solid transparent; color:var(--text-muted); font-family:'DM Mono',monospace; font-size:13px; padding:8px 16px; border-radius:var(--radius); cursor:pointer; transition:all .2s; }
    nav button:hover { color:var(--text); background:var(--surface); }
    nav button.active { color:var(--accent); border-color:var(--accent-dim); background:var(--surface); }
    .container { max-width:1100px; margin:0 auto; padding:32px; }
    .view { display:none; } .view.active { display:block; }
    .chess-board { display:inline-grid; grid-template-columns:repeat(8,1fr); border:2px solid var(--border); border-radius:4px; overflow:hidden; width:400px; height:400px; }
    .chess-sq { display:flex; align-items:center; justify-content:center; font-size:38px; line-height:1; cursor:default; user-select:none; position:relative; aspect-ratio:1; overflow:hidden; }
    .chess-sq.light { background:var(--light-sq); } .chess-sq.dark { background:var(--dark-sq); }
    .chess-sq .coord { position:absolute; font-size:9px; font-family:'DM Mono',monospace; opacity:.5; }
    .chess-sq .coord-file { bottom:1px; right:3px; } .chess-sq .coord-rank { top:1px; left:3px; }
    .chess-sq.light .coord { color:var(--dark-sq); } .chess-sq.dark .coord { color:var(--light-sq); }
    .white-piece { color:#fff; text-shadow:0 0 2px rgba(0,0,0,.8), 0 1px 3px rgba(0,0,0,.6); }
    .black-piece { color:#1a1a1a; text-shadow:none; }
    .board-area { display:grid; grid-template-columns:400px 1fr; gap:32px; align-items:start; }
    .panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; }
    .panel h2 { font-family:'Instrument Serif',serif; font-size:20px; font-weight:400; margin-bottom:16px; color:var(--accent); }
    label { display:block; font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; margin-top:16px; }
    label:first-child { margin-top:0; }
    input[type="text"],textarea { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:'DM Mono',monospace; font-size:13px; padding:10px 12px; border-radius:var(--radius); outline:none; transition:border-color .2s; }
    input[type="text"]:focus,textarea:focus { border-color:var(--accent-dim); }
    textarea { resize:vertical; min-height:80px; }
    .btn { display:inline-flex; align-items:center; gap:6px; font-family:'DM Mono',monospace; font-size:13px; padding:10px 20px; border-radius:var(--radius); border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; transition:all .2s; }
    .btn:hover { background:var(--surface-hover); border-color:var(--accent-dim); }
    .btn-primary { background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:500; }
    .btn-primary:hover { background:#d4b35a; }
    .btn-success { border-color:var(--green); color:var(--green); } .btn-success:hover { background:rgba(106,191,105,.1); }
    .btn-danger { border-color:var(--red); color:var(--red); } .btn-danger:hover { background:rgba(224,85,85,.1); }
    .btn-sm { padding:6px 12px; font-size:12px; }
    .btn-row { display:flex; gap:8px; margin-top:20px; flex-wrap:wrap; }
    .tag { display:inline-block; background:var(--tag-bg); color:var(--accent); font-size:12px; padding:4px 10px; border-radius:20px; margin:2px 4px 2px 0; border:1px solid var(--border); }
    .tag-filter { cursor:pointer; transition:all .2s; }
    .tag-filter:hover,.tag-filter.selected { background:var(--accent-dim); color:var(--bg); border-color:var(--accent); }
    .pos-list { display:flex; flex-direction:column; gap:8px; }
    .pos-item { display:flex; align-items:center; gap:16px; padding:12px 16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; transition:all .2s; }
    .pos-item:hover { border-color:var(--accent-dim); background:var(--surface-hover); }
    .pos-item .title { flex:1; font-size:14px; }
    .mini-board { display:inline-grid; grid-template-columns:repeat(8,1fr); width:48px; height:48px; border-radius:3px; overflow:hidden; flex-shrink:0; }
    .mini-board .mini-sq { display:flex; align-items:center; justify-content:center; font-size:4.5px; line-height:1; position:relative; aspect-ratio:1; overflow:hidden; }
    .mini-board .mini-sq.light { background:var(--light-sq); } .mini-board .mini-sq.dark { background:var(--dark-sq); }
    .quiz-board-area { display:flex; flex-direction:column; align-items:center; gap:24px; }
    .quiz-answer { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; max-width:600px; width:100%; }
    .quiz-answer h3 { font-family:'Instrument Serif',serif; font-weight:400; font-size:18px; color:var(--accent); margin-bottom:12px; }
    .quiz-answer pre { white-space:pre-wrap; font-family:'DM Mono',monospace; font-size:13px; color:var(--text-muted); line-height:1.6; }
    .quiz-controls { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .stats-bar { text-align:center; font-size:13px; color:var(--text-muted); }
    .stats-bar span { margin:0 12px; } .stats-bar .correct { color:var(--green); } .stats-bar .incorrect { color:var(--red); }
    .engine-output { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:12px; font-size:12px; color:var(--text-muted); min-height:60px; margin-top:8px; white-space:pre-wrap; font-family:'DM Mono',monospace; }
    .empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
    .toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--green); color:var(--green); padding:12px 20px; border-radius:var(--radius); font-family:'DM Mono',monospace; font-size:13px; z-index:1000; animation:slideUp .3s ease; }
    .toast.error { border-color:var(--red); color:var(--red); }
    @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    @media(max-width:860px) { .board-area{grid-template-columns:1fr} .chess-board{width:100%;height:auto;aspect-ratio:1;max-width:400px} .container{padding:16px} }
  </style>
</head>
<body>
<header>
  <h1>♔ ChessQuiz</h1>
  <nav>
    <button class="active" onclick="showView('positions')">Positions</button>
    <button onclick="showView('add')">Add New</button>
    <button onclick="showView('quiz')">Quiz</button>
  </nav>
</header>
<div class="container">
  <div id="view-positions" class="view active">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <h2 style="font-family:'Instrument Serif',serif;font-size:24px;font-weight:400">Your Positions</h2>
      <div id="tag-filters" style="display:flex;gap:4px;flex-wrap:wrap"></div>
    </div>
    <div id="positions-list" class="pos-list"></div>
  </div>
  <div id="view-add" class="view">
    <div class="board-area">
      <div>
        <div id="board" class="chess-board"></div>
        <div style="margin-top:12px">
          <label>FEN</label>
          <input type="text" id="fen-input" placeholder="Paste FEN here...">
          <div class="btn-row">
            <button class="btn btn-sm" onclick="loadFen()">Load Board</button>
            <button class="btn btn-sm" onclick="setStartPos()">Starting Position</button>
            <button class="btn btn-sm" onclick="flipBoard()">Flip Board</button>
          </div>
        </div>
      </div>
      <div class="panel">
        <h2 id="form-title">New Position</h2>
        <input type="hidden" id="edit-id" value="">
        <label>Title</label>
        <input type="text" id="pos-title" placeholder="e.g. Lucena Position">
        <label>Tags (comma separated)</label>
        <input type="text" id="pos-tags" placeholder="e.g. endgame, rook, lucena">
        <label>Your Notes</label>
        <textarea id="pos-notes" placeholder="Your analysis and observations..."></textarea>
        <label>Stockfish Analysis</label>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-sm" onclick="runStockfish()" id="sf-btn">Run Stockfish</button>
          <span id="sf-status" style="font-size:12px;color:var(--text-muted)"></span>
        </div>
        <div class="engine-output" id="sf-output">Engine output will appear here...</div>
        <textarea id="pos-stockfish" placeholder="Or paste analysis manually..." style="margin-top:8px"></textarea>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="savePosition()">Save Position</button>
          <button class="btn" onclick="clearForm()">Clear</button>
          <button class="btn btn-danger" id="delete-btn" style="display:none" onclick="deletePosition()">Delete</button>
        </div>
      </div>
    </div>
  </div>
  <div id="view-quiz" class="view">
    <div class="quiz-board-area">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px" id="quiz-tag-filters"></div>
      <div id="quiz-board" class="chess-board"></div>
      <div id="quiz-info" style="text-align:center">
        <p id="quiz-title" style="font-family:'Instrument Serif',serif;font-size:22px;margin-bottom:4px"></p>
        <div id="quiz-tags-display" style="margin-bottom:12px"></div>
      </div>
      <div class="quiz-controls" id="quiz-controls">
        <button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button>
      </div>
      <div id="quiz-answer-area" style="display:none;width:100%;max-width:600px">
        <div class="quiz-answer">
          <h3>Your Notes</h3><pre id="quiz-notes"></pre>
          <h3 style="margin-top:16px">Stockfish</h3><pre id="quiz-stockfish"></pre>
        </div>
      </div>
      <div class="stats-bar" id="quiz-stats"></div>
    </div>
  </div>
  <div id="view-detail" class="view">
    <div class="board-area">
      <div>
        <div id="detail-board" class="chess-board"></div>
        <div class="btn-row" style="margin-top:8px"><button class="btn btn-sm" onclick="flipDetailBoard()">Flip Board</button></div>
      </div>
      <div class="panel">
        <h2 id="detail-title">Position</h2>
        <div id="detail-tags" style="margin-bottom:12px"></div>
        <label>FEN</label><div id="detail-fen" style="font-size:12px;color:var(--text-muted);word-break:break-all"></div>
        <label>Your Notes</label><pre id="detail-notes" style="white-space:pre-wrap;font-size:13px;color:var(--text-muted);line-height:1.6"></pre>
        <label>Stockfish Analysis</label><pre id="detail-stockfish" style="white-space:pre-wrap;font-size:13px;color:var(--text-muted);line-height:1.6"></pre>
        <label>Quiz Stats</label><div id="detail-stats" style="font-size:13px;color:var(--text-muted)"></div>
        <div class="btn-row">
          <button class="btn" onclick="editPosition()">Edit</button>
          <button class="btn" onclick="showView('positions')">← Back</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/js/state.js"></script>
<script src="/js/shared.js"></script>
<script src="/js/board.js"></script>
<script src="/js/positions.js"></script>
<script src="/js/quiz.js"></script>
<script src="/js/stockfish.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    BoardManager.create('board', AppState.boardFen);
    BoardManager.create('quiz-board', AppState.boardFen);
    BoardManager.create('detail-board', AppState.boardFen);
    loadPositions();
    loadTags();
    initStockfish();
    setupAutoLoad();
    setupKeyboardSave();
    setupUrlParams();
});
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').then(() => console.log('SW registered')).catch(e => console.log('SW failed:', e)); }
</script>
</body>
</html>
