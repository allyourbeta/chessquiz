<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#c9a84c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ChessQuiz">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChessQuiz</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
    :root {
      --bg: #1a1a1f; --surface: #242429; --surface-hover: #2e2e35;
      --border: #3a3a42; --text: #e8e6e3; --text-muted: #8a8a95;
      --accent: #c9a84c; --accent-dim: #8a7535; --green: #6abf69;
      --red: #e05555; --tag-bg: #2a2a35; --radius: 8px;
      --light-sq: #f0d9b5; --dark-sq: #b58863;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Mono',monospace; background:var(--bg); color:var(--text); min-height:100vh; }
    header { display:flex; align-items:center; justify-content:space-between; padding:20px 32px; border-bottom:1px solid var(--border); }
    header h1 { font-family:'Instrument Serif',serif; font-size:28px; font-weight:400; color:var(--accent); }
    nav { display:flex; gap:4px; }
    nav button { background:none; border:1px solid transparent; color:var(--text-muted); font-family:'DM Mono',monospace; font-size:13px; padding:8px 16px; border-radius:var(--radius); cursor:pointer; transition:all .2s; }
    nav button:hover { color:var(--text); background:var(--surface); }
    nav button.active { color:var(--accent); border-color:var(--accent-dim); background:var(--surface); }
    .container { max-width:1100px; margin:0 auto; padding:32px; }
    .view { display:none; } .view.active { display:block; }
    .chess-board { display:inline-grid; grid-template-columns:repeat(8,1fr); border:2px solid var(--border); border-radius:4px; overflow:hidden; width:400px; height:400px; }
    .chess-sq { display:flex; align-items:center; justify-content:center; font-size:38px; line-height:1; cursor:default; user-select:none; position:relative; aspect-ratio:1; overflow:hidden; }
    .chess-sq.light { background:var(--light-sq); } .chess-sq.dark { background:var(--dark-sq); }
    .chess-sq .coord { position:absolute; font-size:9px; font-family:'DM Mono',monospace; opacity:.5; }
    .chess-sq .coord-file { bottom:1px; right:3px; } .chess-sq .coord-rank { top:1px; left:3px; }
    .chess-sq.light .coord { color:var(--dark-sq); } .chess-sq.dark .coord { color:var(--light-sq); }
    .white-piece { color:#fff; text-shadow:0 0 2px rgba(0,0,0,.8), 0 1px 3px rgba(0,0,0,.6); }
    .black-piece { color:#1a1a1a; text-shadow:none; }
    .board-area { display:grid; grid-template-columns:400px 1fr; gap:32px; align-items:start; }
    .panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; }
    .panel h2 { font-family:'Instrument Serif',serif; font-size:20px; font-weight:400; margin-bottom:16px; color:var(--accent); }
    label { display:block; font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; margin-top:16px; }
    label:first-child { margin-top:0; }
    input[type="text"],textarea { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:'DM Mono',monospace; font-size:13px; padding:10px 12px; border-radius:var(--radius); outline:none; transition:border-color .2s; }
    input[type="text"]:focus,textarea:focus { border-color:var(--accent-dim); }
    textarea { resize:vertical; min-height:80px; }
    .btn { display:inline-flex; align-items:center; gap:6px; font-family:'DM Mono',monospace; font-size:13px; padding:10px 20px; border-radius:var(--radius); border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; transition:all .2s; }
    .btn:hover { background:var(--surface-hover); border-color:var(--accent-dim); }
    .btn-primary { background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:500; }
    .btn-primary:hover { background:#d4b35a; }
    .btn-success { border-color:var(--green); color:var(--green); } .btn-success:hover { background:rgba(106,191,105,.1); }
    .btn-danger { border-color:var(--red); color:var(--red); } .btn-danger:hover { background:rgba(224,85,85,.1); }
    .btn-sm { padding:6px 12px; font-size:12px; }
    .btn-row { display:flex; gap:8px; margin-top:20px; flex-wrap:wrap; }
    .tag { display:inline-block; background:var(--tag-bg); color:var(--accent); font-size:12px; padding:4px 10px; border-radius:20px; margin:2px 4px 2px 0; border:1px solid var(--border); }
    .tag-filter { cursor:pointer; transition:all .2s; }
    .tag-filter:hover,.tag-filter.selected { background:var(--accent-dim); color:var(--bg); border-color:var(--accent); }
    .pos-list { display:flex; flex-direction:column; gap:8px; }
    .pos-item { display:flex; align-items:center; gap:16px; padding:12px 16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; transition:all .2s; }
    .pos-item:hover { border-color:var(--accent-dim); background:var(--surface-hover); }
    .pos-item .title { flex:1; font-size:14px; }
    .mini-board { display:inline-grid; grid-template-columns:repeat(8,1fr); width:48px; height:48px; border-radius:3px; overflow:hidden; flex-shrink:0; }
    .mini-board .mini-sq { display:flex; align-items:center; justify-content:center; font-size:4.5px; line-height:1; position:relative; aspect-ratio:1; overflow:hidden; }
    .mini-board .mini-sq.light { background:var(--light-sq); } .mini-board .mini-sq.dark { background:var(--dark-sq); }
    .quiz-board-area { display:flex; flex-direction:column; align-items:center; gap:24px; }
    .quiz-answer { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; max-width:600px; width:100%; }
    .quiz-answer h3 { font-family:'Instrument Serif',serif; font-weight:400; font-size:18px; color:var(--accent); margin-bottom:12px; }
    .quiz-answer pre { white-space:pre-wrap; font-family:'DM Mono',monospace; font-size:13px; color:var(--text-muted); line-height:1.6; }
    .quiz-controls { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .stats-bar { text-align:center; font-size:13px; color:var(--text-muted); }
    .stats-bar span { margin:0 12px; } .stats-bar .correct { color:var(--green); } .stats-bar .incorrect { color:var(--red); }
    .engine-output { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:12px; font-size:12px; color:var(--text-muted); min-height:60px; margin-top:8px; white-space:pre-wrap; font-family:'DM Mono',monospace; }
    .empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
    .toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--green); color:var(--green); padding:12px 20px; border-radius:var(--radius); font-family:'DM Mono',monospace; font-size:13px; z-index:1000; animation:slideUp .3s ease; }
    .toast.error { border-color:var(--red); color:var(--red); }
    @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    @media(max-width:860px) { .board-area{grid-template-columns:1fr} .chess-board{width:100%;height:auto;aspect-ratio:1;max-width:400px} .container{padding:16px} }
  </style>
</head>
<body>
<header>
  <h1>♔ ChessQuiz</h1>
  <nav>
    <button class="active" onclick="showView('positions')">Positions</button>
    <button onclick="showView('add')">Add New</button>
    <button onclick="showView('quiz')">Quiz</button>
  </nav>
</header>
<div class="container">
  <!-- POSITIONS LIST -->
  <div id="view-positions" class="view active">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <h2 style="font-family:'Instrument Serif',serif;font-size:24px;font-weight:400">Your Positions</h2>
      <div id="tag-filters" style="display:flex;gap:4px;flex-wrap:wrap"></div>
    </div>
    <div id="positions-list" class="pos-list"></div>
  </div>
  <!-- ADD/EDIT -->
  <div id="view-add" class="view">
    <div class="board-area">
      <div>
        <div id="board" class="chess-board"></div>
        <div style="margin-top:12px">
          <label>FEN</label>
          <input type="text" id="fen-input" placeholder="Paste FEN here...">
          <div class="btn-row">
            <button class="btn btn-sm" onclick="loadFen()">Load Board</button>
            <button class="btn btn-sm" onclick="setStartPos()">Starting Position</button>
            <button class="btn btn-sm" onclick="flipBoard()">Flip Board</button>
          </div>
        </div>
      </div>
      <div class="panel">
        <h2 id="form-title">New Position</h2>
        <input type="hidden" id="edit-id" value="">
        <label>Title</label>
        <input type="text" id="pos-title" placeholder="e.g. Lucena Position">
        <label>Tags (comma separated)</label>
        <input type="text" id="pos-tags" placeholder="e.g. endgame, rook, lucena">
        <label>Your Notes</label>
        <textarea id="pos-notes" placeholder="Your analysis and observations..."></textarea>
        <label>Stockfish Analysis</label>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-sm" onclick="runStockfish()" id="sf-btn">Run Stockfish</button>
          <span id="sf-status" style="font-size:12px;color:var(--text-muted)"></span>
        </div>
        <div class="engine-output" id="sf-output">Engine output will appear here...</div>
        <textarea id="pos-stockfish" placeholder="Or paste analysis manually..." style="margin-top:8px"></textarea>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="savePosition()">Save Position</button>
          <button class="btn" onclick="clearForm()">Clear</button>
          <button class="btn btn-danger" id="delete-btn" style="display:none" onclick="deletePosition()">Delete</button>
        </div>
      </div>
    </div>
  </div>
  <!-- QUIZ -->
  <div id="view-quiz" class="view">
    <div class="quiz-board-area">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px" id="quiz-tag-filters"></div>
      <div id="quiz-board" class="chess-board"></div>
      <div id="quiz-info" style="text-align:center">
        <p id="quiz-title" style="font-family:'Instrument Serif',serif;font-size:22px;margin-bottom:4px"></p>
        <div id="quiz-tags-display" style="margin-bottom:12px"></div>
      </div>
      <div class="quiz-controls" id="quiz-controls">
        <button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button>
      </div>
      <div id="quiz-answer-area" style="display:none;width:100%;max-width:600px">
        <div class="quiz-answer">
          <h3>Your Notes</h3><pre id="quiz-notes"></pre>
          <h3 style="margin-top:16px">Stockfish</h3><pre id="quiz-stockfish"></pre>
        </div>
      </div>
      <div class="stats-bar" id="quiz-stats"></div>
    </div>
  </div>
  <!-- DETAIL -->
  <div id="view-detail" class="view">
    <div class="board-area">
      <div>
        <div id="detail-board" class="chess-board"></div>
        <div class="btn-row" style="margin-top:8px"><button class="btn btn-sm" onclick="flipDetailBoard()">Flip Board</button></div>
      </div>
      <div class="panel">
        <h2 id="detail-title">Position</h2>
        <div id="detail-tags" style="margin-bottom:12px"></div>
        <label>FEN</label><div id="detail-fen" style="font-size:12px;color:var(--text-muted);word-break:break-all"></div>
        <label>Your Notes</label><pre id="detail-notes" style="white-space:pre-wrap;font-size:13px;color:var(--text-muted);line-height:1.6"></pre>
        <label>Stockfish Analysis</label><pre id="detail-stockfish" style="white-space:pre-wrap;font-size:13px;color:var(--text-muted);line-height:1.6"></pre>
        <label>Quiz Stats</label><div id="detail-stats" style="font-size:13px;color:var(--text-muted)"></div>
        <div class="btn-row">
          <button class="btn" onclick="editPosition()">Edit</button>
          <button class="btn" onclick="showView('positions')">← Back</button>
        </div>
      </div>
    </div>
  </div>
</div>

function pieceKey(ch){const c=ch===ch.toUpperCase()?'w':'b';return c+ch.toUpperCase()}
const API='/api';
let allPositions=[],allTags=[],currentTagFilter=null,quizTagFilters=[];
let quizQueue=[],quizCurrent=null,quizCorrect=0,quizTotal=0;
let currentDetailId=null,currentDetailFen=null,sfWorker=null;
let boardFlipped=false,detailFlipped=false;
let boardFen='rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';

function parseFenBoard(fen){const rows=fen.split(' ')[0].split('/');const b=[];for(const row of rows){const r=[];for(const ch of row){if(ch>='1'&&ch<='8')for(let i=0;i<+ch;i++)r.push(null);else r.push(ch)}b.push(r)}return b}

function renderBoard(id,fen,flipped=false){const c=document.getElementById(id);if(!c)return;const b=parseFenBoard(fen);c.innerHTML='';const files='abcdefgh',ranks='87654321';for(let dr=0;dr<8;dr++)for(let dc=0;dc<8;dc++){const r=flipped?7-dr:dr,col=flipped?7-dc:dc;const isLight=(r+col)%2===0;const piece=b[r][col];const sq=document.createElement('div');sq.className='chess-sq '+(isLight?'light':'dark');if(dc===0){const l=document.createElement('span');l.className='coord coord-rank';l.textContent=ranks[r];sq.appendChild(l)}if(dr===7){const l=document.createElement('span');l.className='coord coord-file';l.textContent=files[col];sq.appendChild(l)}if(piece){const img=document.createElement('img');img.src=PIECE_SVG[pieceKey(piece)];img.style.cssText='position:absolute;width:85%;height:85%;pointer-events:none;';sq.appendChild(img)}c.appendChild(sq)}}

function renderMiniBoard(fen){const b=parseFenBoard(fen);let h='<div class="mini-board">';for(let r=0;r<8;r++)for(let c=0;c<8;c++){const l=(r+c)%2===0;const p=b[r][c];const img=p?`<img src="${PIECE_SVG[pieceKey(p)]}" style="position:absolute;width:100%;height:100%">`:'';h+=`<div class="mini-sq ${l?'light':'dark'}">${img}</div>`}return h+'</div>'}

function initStockfish(){fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js').then(r=>r.blob()).then(blob=>{sfWorker=new Worker(URL.createObjectURL(blob));sfWorker.onmessage=e=>{const l=e.data;if(typeof l==='string'){const o=document.getElementById('sf-output');if(l.startsWith('bestmove')){document.getElementById('sf-status').textContent='Done';document.getElementById('sf-btn').disabled=false;document.getElementById('pos-stockfish').value=o.textContent.trim()}else if(l.startsWith('info depth')){const m=l.match(/depth (\d+).*score (cp|mate) (-?\d+).*pv (.+)/);if(m){const s=m[2]==='mate'?`Mate in ${m[3]}`:`${(+m[3]/100).toFixed(2)}`;const uciMoves=m[4].trim().split(/\s+/);const fen=document.getElementById('fen-input').value.trim();fetch(API+'/chess/uci-to-san',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fen,uci_moves:uciMoves})}).then(r=>r.json()).then(d=>{o.textContent=`Depth ${m[1]}: ${s}\nLine: ${d.san}`}).catch(()=>{o.textContent=`Depth ${m[1]}: ${s}\nLine: ${m[4]}`})}}}};sfWorker.postMessage('uci');console.log('Stockfish loaded')}).catch(e=>{console.log('Stockfish load failed:',e);document.getElementById('sf-status').textContent='Engine unavailable'})}

function runStockfish(){const f=document.getElementById('fen-input').value.trim();if(!f){toast('Enter a FEN first',true);return}if(!sfWorker){toast('Stockfish not available',true);return}document.getElementById('sf-output').textContent='Analyzing...';document.getElementById('sf-status').textContent='Thinking...';document.getElementById('sf-btn').disabled=true;sfWorker.postMessage('ucinewgame');sfWorker.postMessage('position fen '+f);sfWorker.postMessage('go depth 20')}

function showView(name){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+name).classList.add('active');document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));const labels={positions:'Positions',add:'Add New',quiz:'Quiz'};document.querySelectorAll('nav button').forEach(b=>{if(b.textContent===labels[name])b.classList.add('active')});if(name==='positions'){loadPositions();loadTags()}if(name==='quiz')loadTags().then(renderQuizTagFilters);if(name==='add')renderBoard('board',boardFen,boardFlipped)}

async function loadPositions(){let u=API+'/positions/';if(currentTagFilter)u+='?tag='+encodeURIComponent(currentTagFilter);allPositions=await(await fetch(u)).json();renderPositionsList()}
async function loadTags(){allTags=await(await fetch(API+'/tags/')).json();renderTagFilters();return allTags}

async function savePosition(){const editId=document.getElementById('edit-id').value;const fen=document.getElementById('fen-input').value.trim();const title=document.getElementById('pos-title').value.trim();const tags=document.getElementById('pos-tags').value.split(',').map(t=>t.trim()).filter(Boolean);const notes=document.getElementById('pos-notes').value.trim();const sf=document.getElementById('pos-stockfish').value.trim();if(!fen){toast('FEN is required',true);return}const body={fen,title:title||null,notes:notes||null,stockfish_analysis:sf||null,tags};let res;if(editId)res=await fetch(API+'/positions/'+editId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});else res=await fetch(API+'/positions/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(res.ok){toast(editId?'Position updated!':'Position saved!');clearForm();showView('positions')}else{const err=await res.json();toast(err.detail||'Error saving',true)}}

async function deletePosition(){const id=document.getElementById('edit-id').value;if(!id||!confirm('Delete this position?'))return;if((await fetch(API+'/positions/'+id,{method:'DELETE'})).ok){toast('Position deleted');clearForm();showView('positions')}}

async function showDetail(id){const pos=await(await fetch(API+'/positions/'+id)).json();currentDetailId=id;currentDetailFen=pos.fen;detailFlipped=false;document.getElementById('detail-title').textContent=pos.title||'Untitled';document.getElementById('detail-fen').textContent=pos.fen;document.getElementById('detail-notes').textContent=pos.notes||'(none)';document.getElementById('detail-stockfish').textContent=pos.stockfish_analysis||'(none)';document.getElementById('detail-tags').innerHTML=pos.tags.map(t=>`<span class="tag">#${t.name}</span>`).join('');const s=await(await fetch(API+'/quiz/stats/'+id)).json();document.getElementById('detail-stats').textContent=s.total_attempts>0?`${s.total_attempts} attempts, ${(s.accuracy*100).toFixed(0)}% accuracy`:'No quiz attempts yet';showView('detail');renderBoard('detail-board',pos.fen,false)}

function editPosition(){if(!currentDetailId)return;fetch(API+'/positions/'+currentDetailId).then(r=>r.json()).then(pos=>{document.getElementById('edit-id').value=pos.id;document.getElementById('fen-input').value=pos.fen;document.getElementById('pos-title').value=pos.title||'';document.getElementById('pos-tags').value=pos.tags.map(t=>t.name).join(', ');document.getElementById('pos-notes').value=pos.notes||'';document.getElementById('pos-stockfish').value=pos.stockfish_analysis||'';document.getElementById('form-title').textContent='Edit Position';document.getElementById('delete-btn').style.display='inline-flex';boardFen=pos.fen;showView('add');renderBoard('board',boardFen,boardFlipped)})}

async function startQuiz(){quizCorrect=0;quizTotal=0;document.getElementById('quiz-answer-area').style.display='none';let u=API+'/positions/';if(quizTagFilters.length>0)u+='?tag='+encodeURIComponent(quizTagFilters[0]);const positions=await(await fetch(u)).json();if(!positions.length){toast('No positions found',true);return}quizQueue=[...positions].sort(()=>Math.random()-.5);nextQuizQuestion()}

function nextQuizQuestion(){if(!quizQueue.length){document.getElementById('quiz-controls').innerHTML=`<div style="text-align:center"><p style="font-family:'Instrument Serif',serif;font-size:20px;margin-bottom:12px">Quiz Complete!</p><p style="color:var(--text-muted)">${quizCorrect}/${quizTotal} correct</p><button class="btn btn-primary" onclick="startQuiz()" style="margin-top:12px">Restart</button></div>`;return}quizCurrent=quizQueue.pop();document.getElementById('quiz-answer-area').style.display='none';document.getElementById('quiz-title').textContent=quizCurrent.title||'What is the best continuation?';document.getElementById('quiz-tags-display').innerHTML=quizCurrent.tags.map(t=>`<span class="tag">#${t.name}</span>`).join('');renderBoard('quiz-board',quizCurrent.fen,false);document.getElementById('quiz-controls').innerHTML=`<button class="btn btn-primary" onclick="revealAnswer()">Reveal Answer</button><button class="btn" onclick="skipQuestion()">Skip</button>`;updateQuizStats()}

async function revealAnswer(){const pos=await(await fetch(API+'/quiz/reveal/'+quizCurrent.id)).json();document.getElementById('quiz-notes').textContent=pos.notes||'(no notes)';document.getElementById('quiz-stockfish').textContent=pos.stockfish_analysis||'(no engine analysis)';document.getElementById('quiz-answer-area').style.display='block';document.getElementById('quiz-controls').innerHTML=`<button class="btn btn-success" onclick="recordAttempt(true)">✓ Got it</button><button class="btn btn-danger" onclick="recordAttempt(false)">✗ Missed it</button>`}

async function recordAttempt(correct){quizTotal++;if(correct)quizCorrect++;await fetch(API+'/quiz/attempt',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({position_id:quizCurrent.id,correct})});updateQuizStats();nextQuizQuestion()}
function skipQuestion(){nextQuizQuestion()}
function updateQuizStats(){const el=document.getElementById('quiz-stats');el.innerHTML=quizTotal===0?`<span>${quizQueue.length+1} positions remaining</span>`:`<span class="correct">✓ ${quizCorrect}</span><span class="incorrect">✗ ${quizTotal-quizCorrect}</span><span>${quizQueue.length} remaining</span>`}

function renderPositionsList(){const el=document.getElementById('positions-list');if(!allPositions.length){el.innerHTML=`<div class="empty-state"><p style="font-family:'Instrument Serif',serif;font-size:20px">No positions yet</p><p>Click "Add New" to save your first chess position.</p></div>`;return}el.innerHTML=allPositions.map(p=>`<div class="pos-item" onclick="showDetail(${p.id})">${renderMiniBoard(p.fen)}<div class="title">${p.title||'Untitled'}</div><div>${p.tags.map(t=>`<span class="tag">#${t.name}</span>`).join('')}</div></div>`).join('')}

function renderTagFilters(){document.getElementById('tag-filters').innerHTML=`<span class="tag tag-filter ${!currentTagFilter?'selected':''}" onclick="filterByTag(null)">All</span>`+allTags.map(t=>`<span class="tag tag-filter ${currentTagFilter===t.name?'selected':''}" onclick="filterByTag('${t.name}')">#${t.name}</span>`).join('')}

function renderQuizTagFilters(){document.getElementById('quiz-tag-filters').innerHTML=`<span style="font-size:12px;color:var(--text-muted);margin-right:8px">Filter:</span><span class="tag tag-filter ${!quizTagFilters.length?'selected':''}" onclick="toggleQuizTag(null)">All</span>`+allTags.map(t=>`<span class="tag tag-filter ${quizTagFilters.includes(t.name)?'selected':''}" onclick="toggleQuizTag('${t.name}')">#${t.name}</span>`).join('')}

function filterByTag(t){currentTagFilter=t;loadPositions();renderTagFilters()}
function toggleQuizTag(t){quizTagFilters=t?[t]:[];renderQuizTagFilters()}
function loadFen(){const f=document.getElementById('fen-input').value.trim();if(f){boardFen=f;renderBoard('board',boardFen,boardFlipped)}}
function setStartPos(){const f='rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';document.getElementById('fen-input').value=f;boardFen=f;renderBoard('board',boardFen,boardFlipped)}
function flipBoard(){boardFlipped=!boardFlipped;renderBoard('board',boardFen,boardFlipped)}
function flipDetailBoard(){detailFlipped=!detailFlipped;renderBoard('detail-board',currentDetailFen,detailFlipped)}
function clearForm(){document.getElementById('edit-id').value='';document.getElementById('fen-input').value='';document.getElementById('pos-title').value='';document.getElementById('pos-tags').value='';document.getElementById('pos-notes').value='';document.getElementById('pos-stockfish').value='';document.getElementById('sf-output').textContent='Engine output will appear here...';document.getElementById('form-title').textContent='New Position';document.getElementById('delete-btn').style.display='none';boardFen='rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';boardFlipped=false;renderBoard('board',boardFen,false)}
function toast(msg,err=false){const el=document.createElement('div');el.className='toast'+(err?' error':'');el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),3000)}


// --- UX: Auto-load on paste ---
function setupAutoLoad(){const inp=document.getElementById('fen-input');inp.addEventListener('input',()=>{const v=inp.value.trim();if(v.includes('/')&&v.length>10){boardFen=v;renderBoard('board',boardFen,boardFlipped)}})}

// --- UX: Cmd+S / Ctrl+S to save-and-clear ---
function setupKeyboardSave(){document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();const addView=document.getElementById('view-add');if(addView&&addView.classList.contains('active')){savePosition()}}})}

// --- UX: Remember last tags ---
let lastTags='';
const _origSave=savePosition;
savePosition=async function(){const tagsField=document.getElementById('pos-tags');lastTags=tagsField.value;localStorage.setItem('chessquiz-last-tags',lastTags);return _origSave.apply(this,arguments)};
const _origClear=clearForm;
clearForm=function(){_origClear.apply(this,arguments);const saved=lastTags||localStorage.getItem('chessquiz-last-tags')||'';if(saved)document.getElementById('pos-tags').value=saved};

// --- UX: ?fen= URL param (bookmarklet support) ---
function setupUrlParams(){const p=new URLSearchParams(window.location.search);const fen=p.get('fen');if(fen){document.getElementById('fen-input').value=fen;boardFen=fen;showView('add');renderBoard('board',boardFen,false);window.history.replaceState({},'',window.location.pathname)}}

document.addEventListener('DOMContentLoaded',()=>{renderBoard('board',boardFen,false);renderBoard('quiz-board',boardFen,false);renderBoard('detail-board',boardFen,false);loadPositions();loadTags();initStockfish();setupAutoLoad();setupKeyboardSave();setupUrlParams()});

// --- PWA: Service Worker Registration ---
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').then(()=>console.log('SW registered')).catch(e=>console.log('SW failed:',e))}
</script>
