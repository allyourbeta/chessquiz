<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stockfish Parser Tests</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
h1 { margin-bottom: 8px; }
.pass { color: #16a34a; font-weight: 700; }
.fail { color: #dc2626; font-weight: 700; }
.test { padding: 6px 0; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
#summary { font-size: 18px; font-weight: 700; margin-top: 20px; padding: 12px; border-radius: 8px; }
#summary.all-pass { background: #dcfce7; color: #16a34a; }
#summary.has-fail { background: #fee2e2; color: #dc2626; }
pre.detail { font-size: 12px; color: #666; margin: 2px 0 0 20px; }
</style>
</head>
<body>
<h1>Stockfish Parser & UCI-to-SAN Tests</h1>
<div id="results"></div>
<div id="summary"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="/js/stockfish-service.js"></script>
<script>
(function () {
    var results = document.getElementById('results');
    var passed = 0;
    var failed = 0;

    function assert(testName, condition, detail) {
        var div = document.createElement('div');
        div.className = 'test';
        if (condition) {
            div.innerHTML = '<span class="pass">PASS</span> ' + testName;
            passed++;
        } else {
            div.innerHTML = '<span class="fail">FAIL</span> ' + testName;
            if (detail) div.innerHTML += '<pre class="detail">' + detail + '</pre>';
            failed++;
        }
        results.appendChild(div);
    }

    var parseInfoLine = StockfishService.parseInfoLine;
    var uciToSan = StockfishService.uciToSan;

    // Test 1: Parse a cp score line
    var line1 = 'info depth 15 seldepth 20 multipv 1 score cp 145 nodes 524831 nps 1049662 time 500 pv e2e4 e7e5 g1f3 b8c6 f1b5';
    var result1 = parseInfoLine(line1);
    assert('Test 1a: cp line pv === 1', result1 && result1.pv === 1, 'Got: ' + (result1 && result1.pv));
    assert('Test 1b: cp line depth === 15', result1 && result1.depth === 15, 'Got: ' + (result1 && result1.depth));
    assert('Test 1c: cp line scoreCp === 145', result1 && result1.scoreCp === 145, 'Got: ' + (result1 && result1.scoreCp));
    assert('Test 1d: cp line score === "+1.45"', result1 && result1.score === '+1.45', 'Got: ' + (result1 && result1.score));
    assert('Test 1e: cp line isMate === false', result1 && result1.isMate === false, 'Got: ' + (result1 && result1.isMate));

    // Test 2: Parse a mate score line
    var line2 = 'info depth 25 seldepth 10 multipv 1 score mate 3 nodes 100000 pv e2e4 e7e5 d1h5';
    var result2 = parseInfoLine(line2);
    assert('Test 2a: mate line isMate === true', result2 && result2.isMate === true, 'Got: ' + (result2 && result2.isMate));
    assert('Test 2b: mate line mateIn === 3', result2 && result2.mateIn === 3, 'Got: ' + (result2 && result2.mateIn));
    assert('Test 2c: mate line score === "M3"', result2 && result2.score === 'M3', 'Got: ' + (result2 && result2.score));

    // Test 3: Parse negative mate
    var line3 = 'info depth 20 multipv 2 score mate -2 pv a1a2 b2b1q';
    var result3 = parseInfoLine(line3);
    assert('Test 3a: negative mate score === "-M2"', result3 && result3.score === '-M2', 'Got: ' + (result3 && result3.score));
    assert('Test 3b: negative mate mateIn === -2', result3 && result3.mateIn === -2, 'Got: ' + (result3 && result3.mateIn));
    assert('Test 3c: negative mate pv === 2', result3 && result3.pv === 2, 'Got: ' + (result3 && result3.pv));

    // Test 4: Ignore non-pv info lines
    var line4 = 'info string NNUE evaluation using nn-...';
    var result4 = parseInfoLine(line4);
    assert('Test 4: info string line returns null', result4 === null, 'Got: ' + JSON.stringify(result4));

    // Test 5: Ignore bestmove lines
    var line5 = 'bestmove e2e4 ponder e7e5';
    var result5 = parseInfoLine(line5);
    assert('Test 5: bestmove line returns null', result5 === null, 'Got: ' + JSON.stringify(result5));

    // Test 6: UCI to SAN conversion
    var fen = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
    var sanMoves = uciToSan(fen, ['e2e4', 'e7e5', 'g1f3', 'b8c6']);
    assert('Test 6a: SAN e2e4 → "e4"', sanMoves[0] === 'e4', 'Got: ' + sanMoves[0]);
    assert('Test 6b: SAN e7e5 → "e5"', sanMoves[1] === 'e5', 'Got: ' + sanMoves[1]);
    assert('Test 6c: SAN g1f3 → "Nf3"', sanMoves[2] === 'Nf3', 'Got: ' + sanMoves[2]);
    assert('Test 6d: SAN b8c6 → "Nc6"', sanMoves[3] === 'Nc6', 'Got: ' + sanMoves[3]);

    // Test 7: Line without multipv token treated as PV 1
    var line7 = 'info depth 12 score cp -87 nodes 5000 pv d7d5 e2e4';
    var result7 = parseInfoLine(line7);
    assert('Test 7a: no multipv → pv === 1', result7 && result7.pv === 1, 'Got: ' + (result7 && result7.pv));
    assert('Test 7b: negative cp → score === "-0.87"', result7 && result7.score === '-0.87', 'Got: ' + (result7 && result7.score));
    assert('Test 7c: negative cp → scoreCp === -87', result7 && result7.scoreCp === -87, 'Got: ' + (result7 && result7.scoreCp));

    // Test 8: Ignore currmove info lines
    var line8 = 'info depth 10 currmove e2e4 currmovenumber 1';
    var result8 = parseInfoLine(line8);
    assert('Test 8: currmove line (no pv) returns null', result8 === null, 'Got: ' + JSON.stringify(result8));

    // Test 9: Promotion in UCI to SAN
    var fenPromo = '8/P3k3/8/8/8/8/8/4K3 w - - 0 1';
    var sanPromo = uciToSan(fenPromo, ['a7a8b']);
    assert('Test 9: promotion a7a8b → "a8=B"', sanPromo[0] === 'a8=B', 'Got: ' + sanPromo[0]);

    // Summary
    var total = passed + failed;
    var summary = document.getElementById('summary');
    summary.textContent = passed + ' of ' + total + ' tests passed';
    summary.className = failed === 0 ? 'all-pass' : 'has-fail';
})();
</script>
</body>
</html>
